<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pac-Man</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    touch-action: none;
  }
  canvas {
    max-width: 100vw;
    max-height: 100vh;
    width: auto; height: auto;
  }
  #help {
    position: fixed; bottom: 6px; right: 10px;
    color: #555; font: 12px monospace;
    user-select: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="help">arrows / WASD move &middot; P pause &middot; Enter restart</div>
<script src="game.js"></script>
<script>
'use strict';
const T = 24, HUD = Math.round(T * 1.5);
const canvas = document.getElementById('c');
canvas.width = 28 * T;
canvas.height = 31 * T + HUD * 2;
const ctx = canvas.getContext('2d');

const game = new Game();
window.game = game; // exposed for automated tests
game.highScore = Number(localStorage.getItem('pacman-high') || 0);

// ---------- sound (simple WebAudio synth) ----------
let audio = null;
function ensureAudio() {
  if (!audio) {
    try { audio = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { audio = false; }
  }
  if (audio && audio.state === 'suspended') audio.resume();
}
function beep(freq, dur, type, vol, slideTo) {
  if (!audio) return;
  const t0 = audio.currentTime;
  const osc = audio.createOscillator();
  const g = audio.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t0);
  if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(vol || 0.04, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g).connect(audio.destination);
  osc.start(t0);
  osc.stop(t0 + dur + 0.02);
}
let lastWaka = 0;
game.onEvent = name => {
  if (!audio) return;
  const now = performance.now();
  switch (name) {
    case 'waka1': case 'waka2':
      if (now - lastWaka < 70) return;
      lastWaka = now;
      beep(name === 'waka1' ? 440 : 560, 0.07, 'square', 0.035);
      break;
    case 'power':     beep(120, 0.4, 'sawtooth', 0.05, 480); break;
    case 'eatghost':  beep(300, 0.3, 'square', 0.06, 1200); break;
    case 'death':     beep(900, 1.2, 'sawtooth', 0.06, 60); break;
    case 'levelclear':beep(523, 0.15, 'square', 0.05); setTimeout(() => beep(659, 0.15, 'square', 0.05), 150); setTimeout(() => beep(784, 0.25, 'square', 0.05), 300); break;
    case 'extralife': beep(880, 0.12, 'square', 0.06); setTimeout(() => beep(1320, 0.2, 'square', 0.06), 120); break;
  }
};

// ---------- input ----------
const KEYS = {
  ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
  w: 'up', s: 'down', a: 'left', d: 'right',
  W: 'up', S: 'down', A: 'left', D: 'right',
};
document.addEventListener('keydown', e => {
  ensureAudio();
  if (KEYS[e.key]) {
    game.setDir(KEYS[e.key]);
    e.preventDefault();
  } else if (e.key === 'Enter' || e.key === ' ') {
    game.start();
    e.preventDefault();
  } else if (e.key === 'p' || e.key === 'P') {
    game.togglePause();
  }
});

// touch: swipe to steer, tap to start
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  ensureAudio();
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: performance.now() };
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  if (!touchStart) return;
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  if (Math.abs(dx) > 24 || Math.abs(dy) > 24) {
    game.setDir(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: touchStart.t };
  }
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (touchStart && performance.now() - touchStart.t < 250) game.start();
  touchStart = null;
}, { passive: false });
canvas.addEventListener('mousedown', () => { ensureAudio(); game.start(); });

// ---------- main loop ----------
let last = performance.now();
function frame(now) {
  const dt = (now - last) / 1000;
  last = now;
  game.update(dt);
  if (game.score >= game.highScore) {
    localStorage.setItem('pacman-high', String(game.highScore));
  }
  draw(ctx, game, T, HUD);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
